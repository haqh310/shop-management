<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="modal(id, title, imageUpload, imagePreviewContainer, imagePreview)">
    <div th:id="${id}"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 overflow-y-auto">

        <!-- ĐƯA THẺ FORM LÊN ĐÂY: Bao bọc toàn bộ cấu trúc Modal -->
        <form class="bg-white rounded-lg shadow-xl max-w-2xl w-full flex flex-col max-h-[90vh]">

            <!-- Modal Header -->
            <div
                class="bg-gradient-to-r from-purple-600 to-purple-700 px-6 py-4 md:px-8 md:py-5 flex items-center justify-between shrink-0 rounded-t-lg">
                <h2 class="text-xl md:text-2xl font-bold text-white" th:text="${title}">Tạo Đơn Hàng Mới</h2>
                <button type="button"
                    class="btn-close-modal text-white hover:text-red-500 text-2xl leading-none">✕</button>
            </div>

            <!-- Modal Body -->
            <div class="p-6 md:p-8 overflow-y-auto flex-1 space-y-4 text-gray-700">
                <!-- Row 1 -->
                <div class="grid grid-cols-10 gap-3">
                    <div class="col-span-10">
                        <label class="block text-sm font-semibold text-gray-900 mb-1">Order ID <span
                                class="text-red-500">*</span></label>
                        <!-- Thuộc tính readonly ở đây đã chuẩn, không bị mất data như disabled -->
                        <input name="orderNumber" type="text" placeholder="ORD001237" required readonly
                            class="w-full px-3 py-1.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                    </div>
                </div>

                <!-- Row 2 -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-semibold text-gray-900 mb-1">Note Kho 1</label>
                        <input name="productLink" type="text" placeholder="https://example.com/product"
                            class="w-full px-3 py-1.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-900 mb-1">Note Kho 2</label>
                        <input name="noteSeller" type="text" placeholder="Note..."
                            class="w-full px-3 py-1.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                    </div>
                </div>

                <!-- Row 3 -->
                <div class="grid grid-cols-10 gap-3">
                    <div class="col-span-10 sm:col-span-5">
                        <label class="block text-sm font-semibold text-gray-900 mb-1">tracking <span
                                class="text-red-500">*</span></label>
                        <input name="tracking" type="text" placeholder="123456789" required
                            class="w-full px-3 py-1.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                    </div>
                    <div class="col-span-10 sm:col-span-5">
                        <label class="block text-sm font-semibold text-gray-900 mb-1">Order Number Warehouse <span
                                class="text-red-500">*</span></label>
                        <input name="orderNumberWarehouse" type="text" placeholder="OR123456" required
                            class="w-full px-3 py-1.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                    </div>
                </div>

                <!-- Row 4 -->
                <div class="grid grid-cols-10 gap-3">
                    <div class="col-span-10 sm:col-span-5">
                        <label class="block text-sm font-semibold text-gray-900 mb-1">Zip </label>
                        <input name="zip" type="text" placeholder="1234-5678"
                            class="w-full px-3 py-1.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                    </div>
                    <div class="col-span-10 sm:col-span-5">
                        <label class="block text-sm font-semibold text-gray-900 mb-1">Email </label>
                        <input name="email" type="email" placeholder="example@gmail.com"
                            class="w-full px-3 py-1.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                    </div>
                </div>

                <!-- Row 5 -->
                <div class="grid grid-cols-10 gap-3">
                    <div class="col-span-5 sm:col-span-5">
                        <label class="block text-sm font-semibold text-gray-900 mb-1">Phone number </label>
                        <input name="phoneNumber" type="text" placeholder="0123456789"
                            class="w-full px-3 py-1.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                    </div>
                    <div class="col-span-5 sm:col-span-5">
                        <label class="block text-sm font-semibold text-gray-900 mb-1">Pasword</label>
                        <input name="password" type="text" placeholder="Password123"
                            class="w-full px-3 py-1.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                    </div>
                </div>

                <!-- Row 6 -->
                <div class="grid grid-cols-1 gap-3">
                    <div>
                        <label class="block text-sm font-semibold text-gray-900 mb-1">Link Evidence</label>
                        <input name="linkEvidence" type="text" placeholder="...."
                            class="w-full px-3 py-1.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                    </div>
                </div>

                <!-- Row 7 -->
                <div class="grid grid-cols-1 gap-3">
                    <div>
                        <label class="block text-sm font-semibold text-gray-900 mb-1">Ghi chú </label>
                        <textarea name="noteWarehouse" placeholder="Ghi chú" rows="3"
                            class="w-full px-3 py-1.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm"></textarea>
                    </div>
                </div>
            </div>

            <!-- Modal Footer (Nằm gọn gàng bên trong thẻ form) -->
            <div
                class="flex gap-3 justify-end border-t border-gray-200 px-6 py-4 md:px-8 shrink-0 bg-gray-50 rounded-b-lg">
                <button type="button"
                    class="btn-close-modal px-5 py-1.5 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-100 transition-colors text-sm">Hủy</button>
                <button type="submit"
                    class="px-5 py-1.5 bg-purple-600 hover:bg-purple-700 text-white font-medium rounded-lg transition-colors text-sm">Cập
                    nhật</button>
            </div>

        </form> <!-- Thẻ đóng FORM bao bọc chuẩn xác -->
    </div>
</th:block>

</html>
