<div th:fragment="menu(activePage)" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
  <div class="flex items-center justify-between h-16 sticky top-0 z-10">
    <!-- Logo -->
    <div class="flex-shrink-0">
      <span class="text-2xl font-bold text-blue-600 transition-colors duration-300">
        NC Media
      </span>
    </div>

    <!-- Navigation Menu -->
    <nav class="hidden md:flex items-center gap-8">
      <a href="/order" class="p-2 text-sm font-medium transition-colors duration-200"
        th:classappend="${activePage == 'order'} ? 'border-b-2 border-blue-600  font-semibold' : 'hover:text-blue-600'">Đơn
        hàng</a>
      <a href="/report" class="p-2text-sm font-medium hover:text-white-600 transition-colors duration-200"
        th:classappend="${activePage == 'report'} ? 'border-b-2 border-blue-600  font-semibold' : 'hover:text-blue-600'">Báo
        cáo</a>
      <a href="/performance" class="p-2text-sm font-medium hover:text-white-600 transition-colors duration-200"
        th:classappend="${activePage == 'performance'} ? 'border-b-2 border-blue-600  font-semibold' : 'hover:text-blue-600'">Hiệu
        suất</a>
      <a href="/account" class="p-2text-sm font-medium hover:text-white-600 transition-colors duration-200"
        th:classappend="${activePage == 'account'} ? 'border-b-2 border-blue-600  font-semibold' : 'hover:text-blue-600'">Tài
        khoản</a>
      <a href="/employee" class="p-2 text-sm font-medium hover:text-white-600 transition-colors duration-200"
        th:classappend="${activePage == 'employee'} ? 'border-b-2 border-blue-600 font-semibold' : 'hover:text-blue-600'">Nhân
        viên</a>
    </nav>

    <!-- User Profile & Dropdown -->
    <div class="relative">
      <button id="userButton"
        class="flex items-center gap-3 px-4 py-2 rounded-lg transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 hover:text-blue-600"
        aria-expanded="false" aria-haspopup="true">
        <!-- Avatar -->
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold bg-blue-600 text-white">
          NVA
        </div>

        <!-- User Info -->
        <div class="hidden sm:flex flex-col items-start">
          <p class="text-sm font-medium text-slate-900">
            <span th:text="${#authentication.principal.name}"></span>
          </p>
          <p class="text-xs text-slate-500">
            <span th:text="${#authentication.principal.email}"></span>
          </p>
        </div>

        <!-- Chevron -->
        <svg id="chevronIcon" class="w-4 h-4 text-slate-500 duration-200" fill="none" stroke="currentColor"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
        </svg>
      </button>

      <!-- Dropdown Menu -->
      <div id="dropdownMenu"
        class="absolute right-0 mt-2 w-48 rounded-lg shadow-lg py-2 z-50 hidden bg-white border border-slate-200 transition-all duration-300">
        <!-- Dropdown Items -->
        <div class="py-2">
          <a href="/profile"
            class="w-full px-4 py-2 flex items-center gap-3 text-left text-sm text-slate-900 hover:text-blue-600 transition-colors duration-200">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span>Profile</span>
          </a>
        </div>

        <!-- Logout Button -->
        <div class="border-t border-slate-200 pt-2">
          <a class="w-full px-4 py-2 flex items-center gap-3 text-left text-sm text-red-600 hover:bg-red-50 transition-colors duration-200"
            href="/logout">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            <span>Logout</span>
          </a>
        </div>
      </div>

      <!-- Backdrop -->
      <div id="backdrop" class="fixed inset-0 z-40 hidden" onclick="toggleDropdown()" aria-hidden="true"></div>
    </div>
  </div>
</div>
