<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="stackChart(id, title, isChartPercent, labels, values)">
    <div class="bg-white rounded-lg border border-gray-200 p-6 my-4 mx-2 flex flex-col">
        <h3 class="text-lg font-semibold text-gray-900 mb-6" th:text="${title}"></h3>
        <div class="relative flex-1" style="position: relative; width: 100%; height: 380px;">
            <canvas th:id="${id}"></canvas>
        </div>
    </div>

    <!-- BẮT BUỘC: Phải có th:inline="javascript" ở đây -->
    <script th:inline="javascript">
        (function () {
            // Thymeleaf tự parse Object, không cần JSON.parse() hay bọc nháy chuỗi
            const currentChartId = /*[[${id}]]*/ "defaultId";
            const labels = /*[[${labels}]]*/[];
            let dynamicDatasets = /*[[${values}]]*/[];

            // Đọc trạng thái loại chart từ Thymeleaf (true/false)
            const isPercentMode = /*[[${isChartPercent}]]*/ false;

            // 🌟 1. XỬ LÝ THU NHỎ CỘT & BO GÓC ĐỈNH CỘT THÔNG MINH
            const totalDatasets = dynamicDatasets.length;
            dynamicDatasets = dynamicDatasets.map((dataset, index) => {
                // Thu nhỏ thanh mảnh (chỉnh xuống 24px để tạo khoảng cách thoáng giữa các seller)
                dataset.maxBarThickness = 24;

                return dataset;
            });

            const ctx = document.getElementById(currentChartId).getContext('2d');

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: dynamicDatasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            stacked: true,
                            grid: { display: false },
                            // Điều chỉnh tỷ lệ khoảng cách vùng để cột không bị dính sát nhau
                            categoryPercentage: 0.5,
                            barPercentage: 0.9,
                        },
                        y: {
                            stacked: true,
                            min: 0,
                            max: isPercentMode ? 100 : undefined,
                            ticks: {
                                callback: function (value) {
                                    return isPercentMode ? value + "%" : value;
                                }
                            }
                        }
                    },
                    plugins: {
                        datalabels: {
                            color: '#333',
                            font: { weight: 'bold', size: 11 },
                            textAlign: 'center',
                            formatter: function (value, context) {
                                const originalValue = isPercentMode
                                    ? (context.dataset._originalData ? context.dataset._originalData[context.dataIndex] : value)
                                    : value;

                                if (!originalValue || originalValue === 0) return '';

                                if (isPercentMode) {
                                    const percentage = Math.round(value * 10) / 10;
                                    return originalValue + '\n(' + percentage + '%)';
                                }
                                return originalValue;
                            }
                        },
                        // 🌟 2. SỬA LEGEND: THU NHỎ CHẤM TRÒN VÀ CHỐNG MÉO HÌNH ELIP
                        legend: {
                            display: true,
                            position: 'top',
                            align: 'start',
                            labels: {
                                usePointStyle: true,
                                pointStyle: 'circle',
                                boxWidth: 8,    // Ép khung vuông 8x8 tuyệt đối
                                boxHeight: 8,
                                padding: 20,    // Khoảng cách dòng thoáng đãng
                                font: { size: 12 }
                            }
                        },
                        // 🌟 3. SỬA TOOLTIP: ĐỔI SANG CHẤM TRÒN NHỎ ĐỒNG BỘ
                        tooltip: {
                            usePointStyle: true,
                            boxWidth: 8,    // Ép khung vuông 8x8 tuyệt đối trong tooltip
                            boxHeight: 8,
                            boxPadding: 6,
                            callbacks: {
                                label: function (context) {
                                    const label = context.dataset.label || '';

                                    if (isPercentMode) {
                                        const originalValue = context.dataset._originalData ? context.dataset._originalData[context.dataIndex] : context.parsed.y;
                                        const percentage = Math.round(context.parsed.y * 10) / 10;
                                        return label + ': ' + originalValue + ' (' + percentage + '%)';
                                    } else {
                                        return label + ': ' + context.parsed.y;
                                    }
                                }
                            }
                        }
                    }
                },
                plugins: isPercentMode ? [{
                    id: 'percentageStacked',
                    beforeInit(chart) {
                        chart.data.datasets.forEach((dataset) => {
                            dataset._originalData = [...dataset.data];
                        });
                    },
                    beforeUpdate(chart) {
                        const numOfDataPoints = chart.data.labels.length;
                        const totals = [];
                        for (let i = 0; i < numOfDataPoints; i++) {
                            let sum = 0;
                            chart.data.datasets.forEach((dataset) => {
                                sum += dataset._originalData[i] || 0;
                            });
                            totals.push(sum);
                        }
                        chart.data.datasets.forEach((dataset) => {
                            dataset.data = dataset._originalData.map((val, i) => {
                                return totals[i] > 0 ? (val / totals[i]) * 100 : 0;
                            });
                        });
                    }
                }] : []
            });
        })();
    </script>
</th:block>

</html>
