<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="barChart(id, title, unit, labels, values)">
    <!-- Đảm bảo trang chính (dashboard) của bạn đã nhúng file script này: -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script> -->

    <div class="bg-white rounded-lg border border-gray-200 p-6 my-4 mx-2">
        <h3 class="text-lg font-semibold text-gray-900 mb-6" th:text="${title}"></h3>
        <div class="chart-container" style="position: relative; width: 100%; height: 350px">
            <canvas th:id="${id}"></canvas>
        </div>
    </div>

    <script th:inline="javascript">
        (function () {
            const currentChartId = /*[[${id}]]*/ "defaultId";
            const unit = /*[[${unit}]]*/ " $";
            const labels = /*[[${labels}]]*/[];
            const dynamicDatasets = JSON.parse(/*[[${values}]]*/ '[]');

            console.log(dynamicDatasets);

            const ctx = document.getElementById(currentChartId);

            if (ctx) {
                new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels: labels,
                        datasets: dynamicDatasets
                    },
                    // Kích hoạt plugin hiển thị số trên đầu cột
                    plugins: [ChartDataLabels],
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                labels: {
                                    usePointStyle: true,
                                    pointStyle: 'circle',


                                    boxWidth: 8,
                                    boxHeight: 8,

                                    padding: 20,
                                    font: { size: 11 }
                                }
                            },
                            // 🌟 1. CẤU HÌNH TOOLTIP GỘP THEO CỤM (KHI HOVER)
                            tooltip: {
                                mode: 'index',       // Gom tất cả cột cùng index vào 1 tooltip
                                intersect: false,    // Hover vào vùng trống của cụm vẫn hiện tooltip
                                backgroundColor: "rgba(255, 255, 255, 0.95)", // Nền trắng bo góc giống hình
                                borderColor: "#e5e7eb",
                                borderWidth: 1,
                                padding: 12,
                                titleColor: "#1f2937",
                                bodyColor: "#4b5563",
                                titleFont: { size: 10 },
                                bodyFont: { size: 10 },
                                boxPadding: 6,

                                callbacks: {
                                    title: function (context) {
                                        // Hiển thị tên cụm (Tên nhân viên) ở trên cùng tooltip
                                        return context[0].label;
                                    },
                                    label: function (context) {
                                        let trangThai = context.dataset.label || '';
                                        let value = context.parsed.y !== null ? context.parsed.y : 0;
                                        // Trả về định dạng: "Tên trạng thái: Số lượng đơn"
                                        return trangThai + ": " + value + " " + unit;
                                    }
                                },
                            },
                            // 🌟 2. CẤU HÌNH SỐ ĐƠN LUÔN HIỂN THỊ TRÊN ĐẦU TỪNG CỘT
                            datalabels: {
                                anchor: 'end',    // Neo ở đỉnh cột
                                align: 'top',     // Hiển thị phía trên đỉnh cột
                                offset: 2,        // Khoảng cách cách đỉnh cột 2px
                                color: function (context) {
                                    // Tự động lấy chữ trùng màu với cột cho đồng bộ chuyên nghiệp
                                    return context.dataset.backgroundColor || '#4b5563';
                                },
                                font: {
                                    weight: 'bold',
                                    size: 12
                                },
                                formatter: function (value) {
                                    // Hiển thị số (ví dụ: 12, 7, 4...). Nếu là 0 vẫn hiện số 0 giống như hình thiết kế của bạn.
                                    return value;
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: "#f3f4f6", drawBorder: false },
                                ticks: {
                                    color: "#6b7280",
                                    font: { size: 12 },
                                },
                            },
                            x: {
                                grid: { display: false, drawBorder: false },
                                ticks: { color: "#6b7280", font: { size: 12 } },
                                categoryPercentage: 0.5,
                                barPercentage: 0.5
                            },
                        },
                    },
                });
            }
        })();
    </script>
</th:block>

</html>
