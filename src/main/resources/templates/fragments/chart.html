<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="barChart(id, title, type, chartTitle, unit, labels, values)">
  <!-- Không cần gọi thư viện JS ở đây nếu trang chính (dashboard) đã gọi rồi để tối ưu tốc độ -->

  <div class="bg-white rounded-lg border border-gray-200 p-6 my-4 mx-2">
    <h3 class="text-lg font-semibold text-gray-900 mb-6" th:text="${title}"></h3>
    <div class="chart-container" style="position: relative; width: 100%; height: 350px">
      <canvas th:id="${id}"></canvas>
    </div>
  </div>

  <script th:inline="javascript">
    // SỬA CHỮA: Bọc toàn bộ code JS vào trong một block (IIFE)
    (function () {
      const currentChartId = /*[[${id}]]*/ "defaultId";
      const chartType = /*[[${type}]]*/ "line";
      const chartTitle = /*[[${chartTitle}]]*/ "Thống kê";
      const unit =  /*[[${unit}]]*/ "$";
      const labels = /*[[${labels}]]*/[];
      const values = /*[[${values}]]*/[];

      console.log(labels);
      console.log(values);
      let bgColor = "rgba(37, 99, 235, 0.1)";
      if (chartType == "bar") {
        bgColor = "#2563eb";
      }

      const ctx = document.getElementById(currentChartId);

      if (ctx) {
        new Chart(ctx, {
          type: chartType,
          data: {
            labels: labels,
            datasets: [
              {
                label: chartTitle,
                data: values,
                borderColor: "#2563eb",
                backgroundColor: bgColor,
                tension: 0.4,
                fill: true,
                borderWidth: 2,
                pointRadius: 2,
                pointHoverRadius: 6,
                pointBackgroundColor: "#2563eb",
                pointBorderColor: "#ffffff",
                pointBorderWidth: 2,
                maxBarThickness: chartType === "bar" ? 55 : null
              },
            ],
          },
          // 🌟 KÍCH HOẠT PLUGIN HIỂN THỊ VALUE TRÊN ĐẦU ĐỒ THỊ
          plugins: [ChartDataLabels],
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: "rgba(0, 0, 0, 0.8)",
                padding: 12,
                titleFont: { size: 13 },
                bodyFont: { size: 12 },
                boxPadding: 6,
                callbacks: {
                  label: function (context) {
                    return context.parsed.y + " " + unit;
                  },
                },
              },
              // 🌟 CẤU HÌNH NHÃN SỐ TRÊN ĐẦU CỘT / ĐẦU MẮT LƯỚI LINE
              datalabels: {
                // Nếu là cột (bar) thì neo ở đỉnh cột, nếu là đường (line) thì neo phía trên điểm chấm tròn
                anchor: chartType === 'bar' ? 'end' : 'center',
                align: 'top',       // Đẩy text hiển thị lên phía trên
                offset: chartType === 'bar' ? 4 : 6, // Khoảng cách giãn cách theo pixel
                color: function (context) {
                  // Đổi màu chữ tự động: Biểu đồ cột dùng chữ màu xám đậm, biểu đồ đường dùng chữ xanh dương cho nổi bật
                  return chartType === 'bar' ? '#4b5563' : '#2563eb';
                },
                font: {
                  weight: 'bold',
                  size: 11
                },
                formatter: function (value) {
                  // Hiển thị giá trị kèm đơn vị truyền vào (ví dụ: 4388.51 $)
                  return value + " " + unit;
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                grid: { color: "#f3f4f6", drawBorder: false },
                ticks: {
                  callback: function (value) {
                    return value;
                  },
                  color: "#6b7280",
                  font: { size: 12 },
                },
              },
              x: {
                grid: { display: false, drawBorder: false },
                ticks: { color: "#6b7280", font: { size: 12 } },
                categoryPercentage: chartType === "bar" ? 0.4 : 0.8,
                barPercentage: chartType === "bar" ? 0.6 : 0.9
              },
            },
          },
        });
      }
    })();
  </script>
</th:block>

</html>
