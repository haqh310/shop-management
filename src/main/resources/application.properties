spring.application.name=app

# URL kết nối (MariaDB dùng chung driver/protocol với MySQL nên cấu hình rất quen thuộc)
spring.datasource.url=jdbc:mariadb://127.0.0.1/mydb
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Cấu hình Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
# Tự động tạo/cập nhật bảng từ Entity (tiện khi làm local)
spring.jpa.hibernate.ddl-auto=update
# Hiển thị câu lệnh SQL ra console để tiện debug
spring.jpa.show-sql=true

# Ép devtools luôn kích hoạt tính năng restart
spring.devtools.restart.enabled=true

# Tắt tính năng cache file tĩnh để sửa giao diện (HTML/CSS) nhận ngay mà không cần restart
spring.thymeleaf.cache=false

# Cấu hình Session tự động hết hạn sau 60 phút không hoạt động
server.servlet.session.timeout=60m